repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^\.github/(aw/|workflows/.*\.lock\.yml$)'
      - id: end-of-file-fixer
        exclude: '^\.github/(aw/|workflows/.*\.lock\.yml$)'
      - id: check-yaml
      - id: check-added-large-files

  # Terraform hooks - require terraform/tflint installed locally
  # These run in CI via GitHub Actions instead
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
        stages: [manual]  # Run manually or in CI, not on every commit
      - id: terraform_validate
        stages: [manual]
      - id: terraform_docs
        stages: [manual]
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
      - id: terraform_tflint
        stages: [manual]
        args:
          - --args=--only=terraform_deprecated_interpolation
          - --args=--only=terraform_deprecated_index
          - --args=--only=terraform_unused_declarations
          - --args=--only=terraform_comment_syntax
          - --args=--only=terraform_documented_outputs
          - --args=--only=terraform_documented_variables
          - --args=--only=terraform_typed_variables
          - --args=--only=terraform_module_pinned_source
          - --args=--only=terraform_naming_convention
          - --args=--only=terraform_required_version
          - --args=--only=terraform_required_providers
          - --args=--only=terraform_standard_module_structure

  # Local hooks using tofu directly (no nix/aws-vault needed for mock tests)
  - repo: local
    hooks:
      - id: tofu-test
        name: tofu test (mock providers)
        entry: "bash -c 'if command -v tofu >/dev/null 2>&1; then cd modules && tofu init -backend=false -no-color >/dev/null && tofu test -no-color; elif command -v nix >/dev/null 2>&1; then nix shell nixpkgs#opentofu --command bash -c \"cd modules && tofu init -backend=false -no-color >/dev/null && tofu test -no-color\"; else echo \"Error: tofu not found. Install OpenTofu or Nix.\" >&2; exit 1; fi'"
        language: system
        files: '\.(tf|hcl)$'
        pass_filenames: false

      - id: terragrunt-validate
        name: terragrunt validate
        entry: bash -c 'aws-vault exec tf-splunk-aws -- terragrunt validate'
        language: system
        files: '\.(tf|hcl)$'
        pass_filenames: false
        stages: [manual]

      - id: terragrunt-plan
        name: terragrunt plan
        entry: bash -c 'aws-vault exec tf-splunk-aws -- terragrunt plan -detailed-exitcode; rc=$?; if [ $rc -eq 0 ] || [ $rc -eq 2 ]; then exit 0; else exit 1; fi'
        language: system
        files: '\.(tf|hcl)$'
        pass_filenames: false
        stages: [manual]
