name: Markdown Lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: "Lint Markdown"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
          config: '.markdownlint.yml'
