name: OpenTofu CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tofu:
    name: 'OpenTofu'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2

      - name: Format check
        run: tofu fmt -check -recursive

      - name: Init (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: latest

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint --format compact
        continue-on-error: true

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy security scan
        run: trivy config --severity CRITICAL,HIGH --format table --exit-code 0 .

      - name: Test
        run: tofu test -no-color

      - name: Test isolation check
        run: bash scripts/tofu-test-isolation-check.sh
