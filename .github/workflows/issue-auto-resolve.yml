name: Issue Auto-Resolve

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to resolve"
        required: true
        type: string
  issues:
    types: [opened, labeled]

# Workflow-level permissions are `{}` — each job below grants only what it
# needs at job level, so zizmor's excessive-permissions audit (workflow-level
# grants apply to every job, including ones that don't need them) clears.
permissions: {}

jobs:
  dispatch:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
    steps:
      - name: Dispatch as workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          # Filter labeled events to only ai:ready
          if [[ "$EVENT_ACTION" == "labeled" && "$LABEL_NAME" != "ai:ready" ]]; then
            echo "Label '$LABEL_NAME' is not ai:ready — skipping"
            exit 0
          fi

          # Daily dispatch limit (cost control safety valve)
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(gh run list \
            --workflow "$WORKFLOW_NAME" \
            --repo "$REPO" \
            --event workflow_dispatch \
            --created ">=$TODAY" \
            --json databaseId --jq 'length')
          if [[ "$COUNT" -ge 5 ]]; then
            echo "Daily dispatch limit reached ($COUNT/5) — skipping"
            exit 0
          fi

          # Remove ai:ready label so it can be re-applied to re-trigger
          if [[ "$EVENT_ACTION" == "labeled" && "$LABEL_NAME" == "ai:ready" ]]; then
            gh issue edit "$ISSUE_NUM" --repo "$REPO" --remove-label "ai:ready" || true
          fi

          gh workflow run "$WORKFLOW_NAME" \
            --repo "$REPO" \
            -f issue_number="$ISSUE_NUM"

  run-triage:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    uses: dryvist/ai-workflows/.github/workflows/issue-triage.yml@main
    secrets: inherit
    with:
      issue_number: ${{ inputs.issue_number }}

  resolve-issue:
    needs: [run-triage]
    if: >-
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (needs.run-triage.result == 'success' || needs.run-triage.result == 'skipped')
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    uses: dryvist/ai-workflows/.github/workflows/cc-issue-resolver.yml@main
    secrets: inherit
    with:
      repo_context: "Terraform/Terragrunt deploying Splunk on AWS (VPC, EC2, EBS, IAM)"
      extra_tools: "Bash(terraform:*)"
      issue_number: ${{ inputs.issue_number }}
